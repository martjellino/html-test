<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Daily Digest — Blog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent-1: #ff6b6b;
      --accent-2: #ffa94d;
      --accent-3: #51cf66;
      --accent-4: #339af0;
      --accent-5: #cc5de8;
      --bg: #f8f9fa;
      --surface: #ffffff;
      --text: #212529;
      --muted: #6c757d;
      --border: #dee2e6;
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 3px solid var(--text);
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0;
    }

    .logo {
      font-size: 1.75rem;
      font-weight: 900;
      letter-spacing: -1px;
      text-decoration: none;
      color: var(--text);
    }

    .logo span {
      color: var(--accent-1);
    }

    nav a {
      text-decoration: none;
      color: var(--muted);
      font-family: 'Arial', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-left: 1.5rem;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--text); }

    /* ── Hero banner ── */
    .hero {
      background: linear-gradient(135deg, #212529 0%, #343a40 100%);
      color: white;
      padding: 3rem 2rem;
      text-align: center;
    }

    .hero-inner { max-width: 700px; margin: 0 auto; }

    .hero-tag {
      display: inline-block;
      background: var(--accent-1);
      color: white;
      padding: 0.25rem 0.5rem;
      border-radius: 5px;
    }

    /* ── Dark Mode Styles ── */
    body.dark {
      background: #1a1b1e;
      color: #c1c2c5;
    }

    body.dark header {
      background: #25262b;
      border-bottom: 3px solid #c1c2c5;
    }

    /* Toggle button */
    .theme-toggle {
      cursor: pointer;
      font-size: 1rem;
      margin-left: auto;
      transition: color 0.2s;
    }

  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="" class="logo">The Daily <span>Digest</span></a>
      <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
        <span class="theme-toggle" id="theme-toggle">◑ dark</span>
      </nav>
    </div>
  </header>
  <!-- Add scripts for theme toggle -->
  <script>
    const toggle = document.getElementById('theme-toggle');
    const body = document.body;

    // Check for saved user preference, if any, on initial load
    if (localStorage.getItem('dark-mode') === 'enabled') {
      body.classList.add('dark');
      toggle.textContent = '◑ light';
    }

    toggle.addEventListener('click', () => {
      body.classList.toggle('dark');
      if (body.classList.contains('dark')) {
        toggle.textContent = '◑ light';
        localStorage.setItem('dark-mode', 'enabled');
      } else {
        toggle.textContent = '◑ dark';
        localStorage.setItem('dark-mode', 'disabled');
      }
    });
  </script>
</body>
</html>
