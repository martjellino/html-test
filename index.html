<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Daily Digest — Blog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent-1: #ff6b6b;
      --accent-2: #ffa94d;
      --accent-3: #51cf66;
      --accent-4: #339af0;
      --accent-5: #cc5de8;
      --bg: #212529;
      --surface: #343a40;
      --text: #f8f9fa;
      --muted: #6c757d;
      --border: #dee2e6;
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 3px solid var(--text);
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0;
    }

    .logo {
      font-size: 1.75rem;
      font-weight: 900;
      letter-spacing: -1px;
      text-decoration: none;
      color: var(--text);
    }

    .logo span {
      color: var(--accent-1);
    }

    nav a {
      text-decoration: none;
      color: var(--muted);
      font-family: 'Arial', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-left: 1.5rem;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--text); }

    /* ── Hero banner ── */
    .hero {
      background: linear-gradient(135deg, #f8f9fa 0%, #dee2e6 100%);
      color: #212529;
      padding: 3rem 2rem;
      text-align: center;
    }

    .hero-inner { max-width: 700px; margin: 0 auto; }

    .hero-tag {
      display: inline-block;
      background: var(--accent-1);
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 5px;
      margin-bottom: 1rem;
    }

    /* ── Main content ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* ── Footer ── */
    footer {
      background: var(--surface);
      padding: 1rem 0;
      text-align: center;
    }

    .btn {
      background: var(--accent-4);
      color: white;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 5px;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn:hover {
      background: var(--accent-5);
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="logo">The Daily <span>Digest</span></a>
      <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="hero">
      <div class="hero-inner">
        <h1>Welcome to The Daily Digest</h1>
        <p>Your source for the latest news and insights.</p>
      </div>
    </div>

    <!-- Content goes here -->
  </main>

  <footer>
    <p style="margin-bottom:0.5rem;">
      <a href="#">Home</a> &nbsp;·&nbsp;
      <a href="#">About</a> &nbsp;·&nbsp;
      <a href="#">Write for Us</a> &nbsp;·&nbsp;
      <a href="#">Privacy</a> &nbsp;·&nbsp;
      <a href="#">Contact</a>
    </p>
    <p>&copy; 2026 The Daily Digest. All rights reserved. Made with love and a lot of coffee.</p>
  </footer>

</body>
</html>
